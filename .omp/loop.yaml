# Loop Engineering v2 Configuration
# Before Loop (Cloner对话→plan.md) → In Loop (Workers自组织→Cloner审查) → After Loop (经验沉淀)

swarm:
  name: loop-engineering
  workspace: ..
  mode: loop

  max_iterations: 5
  auto_retry: true
  human_escalation: true

  workers:
    initial: 4
    min: 1
    max: 12
    max_rounds: 5
    rounds_convergence_threshold: 3
  plan_debate:
    enabled: true
    cloner_count: 2
    max_rounds: 3
    convergence_threshold: 2

  cloners:
    count: 4
  # Agents are created dynamically — no preset knights.
  agents: {}
  agent_restrictions:
    socrates:
      allowed: ["read", "write", "grep", "find", "glob"]
      write_allowlist: ["plan.md"]
