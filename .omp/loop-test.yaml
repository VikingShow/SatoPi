# Minimal Loop Engineering v2 Test
swarm:
  name: loop-test
  workspace: ./test-workspace
  mode: loop

  max_iterations: 2
  auto_retry: false
  human_escalation: false

  workers:
    initial: 4
    min: 1
    max: 8
    max_rounds: 3
    rounds_convergence_threshold: 2
  plan_debate:
    enabled: true
    cloner_count: 2
    max_rounds: 2
    convergence_threshold: 2

  cloners:
    count: 2
  agents: {}
