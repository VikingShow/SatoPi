# Arm D: Full swarm with deliberation + cloner review
# Tests whether external cloner review adds value beyond worker debate

swarm:
  name: ablation-cloner
  workspace: ..
  mode: loop

  max_iterations: 3
  auto_retry: false
  human_escalation: false

  workers:
    initial: 3
    min: 3
    max: 3
    max_rounds: 5
    rounds_convergence_threshold: 3

  plan_debate:
    enabled: true
    cloner_count: 0
    max_rounds: 3
    convergence_threshold: 2

  cloners:
    count: 2

  agents: {}

  agent_restrictions: {}
