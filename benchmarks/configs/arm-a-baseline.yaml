# Arm A: ReAct baseline — single worker, no swarm collaboration
# This is the control group showing what the agent can do alone

swarm:
  name: ablation-baseline
  workspace: ..
  mode: loop

  max_iterations: 3
  auto_retry: false
  human_escalation: false

  workers:
    initial: 1
    min: 1
    max: 1
    max_rounds: 1
    rounds_convergence_threshold: 1

  plan_debate:
    enabled: false

  cloners:
    count: 0

  agents: {}

  agent_restrictions: {}
